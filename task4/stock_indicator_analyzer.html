<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Indicator Analyzer — 股票技术指标分析工具</title>
<!-- ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<!-- PapaParse (CSV解析) -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
<!-- SheetJS (CSV导出) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18/dist/xlsx.full.min.js"></script>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-card: #1c2128;
  --bg-hover: #21262d;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --red-rise: #e24b4a;
  --red-rise-light: rgba(226,75,74,0.15);
  --green-fall: #1d9e75;
  --green-fall-light: rgba(29,158,117,0.15);
  --blue-ind: #378add;
  --amber-ind: #ba7517;
  --purple-ind: #7f77dd;
  --purple-light: rgba(127,119,221,0.15);
  --orange-squeeze: #d4853a;
  --slider-track: #30363d;
  --slider-fill: rgba(88,166,255,0.35);
  --slider-handle: #58a6ff;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --radius: 8px;
  --radius-sm: 4px;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f6f8fa;
    --bg-secondary: #ffffff;
    --bg-card: #ffffff;
    --bg-hover: #f3f4f6;
    --border: #d0d7de;
    --text-primary: #1f2328;
    --text-secondary: #656d76;
    --text-muted: #8c959f;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
}
html { font-size: 14px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Helvetica, Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
}

/* ===== Layout ===== */
.app-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ===== Top Bar ===== */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.top-bar .logo {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.5px;
  color: var(--accent);
}
.top-bar .stock-info {
  display: flex;
  align-items: center;
  gap: 12px;
}
.top-bar .stock-name {
  font-size: 15px;
  font-weight: 500;
}
.top-bar .data-source-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg-hover);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.top-bar .actions {
  display: flex;
  gap: 8px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-hover);
  color: var(--text-primary);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: var(--border); }
.btn-accent {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-accent:hover { background: var(--accent-hover); }
.btn svg { width: 14px; height: 14px; }

/* ===== Summary Cards ===== */
.summary-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.summary-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.summary-card .label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.summary-card .value {
  font-size: 20px;
  font-weight: 700;
}
.summary-card .value.rise { color: var(--red-rise); }
.summary-card .value.fall { color: var(--green-fall); }
.summary-card .sub {
  font-size: 12px;
  color: var(--text-secondary);
}
.volatility-badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
}
.volatility-badge.low { background: var(--green-fall-light); color: var(--green-fall); }
.volatility-badge.mid { background: var(--amber-ind); color: #fff; background: rgba(186,117,23,0.2); color: var(--amber-ind); }
.volatility-badge.high { background: var(--red-rise-light); color: var(--red-rise); }

/* ===== Time Slider ===== */
.slider-panel {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
}
.slider-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.slider-header .title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}
.slider-header .range-label {
  font-size: 12px;
  color: var(--text-muted);
}
.quick-btns {
  display: flex;
  gap: 6px;
}
.quick-btn {
  padding: 4px 10px;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-hover);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
}
.quick-btn:hover { background: var(--border); color: var(--text-primary); }
.quick-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.slider-track-wrapper {
  position: relative;
  height: 36px;
  margin: 4px 0;
}
.slider-track {
  position: absolute;
  top: 14px;
  left: 0;
  right: 0;
  height: 6px;
  background: var(--slider-track);
  border-radius: 3px;
}
.slider-fill {
  position: absolute;
  top: 14px;
  height: 6px;
  background: var(--slider-fill);
  border-radius: 3px;
  pointer-events: none;
}
.slider-handle {
  position: absolute;
  top: 6px;
  width: 8px;
  height: 22px;
  background: var(--slider-handle);
  border-radius: 4px;
  cursor: grab;
  z-index: 2;
  transition: box-shadow 0.15s;
}
.slider-handle:hover { box-shadow: 0 0 6px var(--accent); }
.slider-handle:active { cursor: grabbing; box-shadow: 0 0 10px var(--accent); }
.slider-handle::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 2px;
}
.slider-ticks {
  position: relative;
  height: 16px;
  margin-top: 2px;
}
.slider-tick {
  position: absolute;
  bottom: 0;
  font-size: 10px;
  color: var(--text-muted);
  transform: translateX(-50%);
}
.slider-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  text-align: center;
}

/* ===== Indicator Grid ===== */
.indicator-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.indicator-panel {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
}
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.panel-title {
  font-size: 14px;
  font-weight: 600;
}
.panel-params {
  display: flex;
  align-items: center;
  gap: 6px;
}
.param-group {
  display: flex;
  align-items: center;
  gap: 3px;
}
.param-label {
  font-size: 11px;
  color: var(--text-muted);
}
.param-input {
  width: 42px;
  padding: 3px 5px;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-hover);
  color: var(--text-primary);
  text-align: center;
}
.param-input:focus { border-color: var(--accent); outline: none; }
.param-select {
  padding: 3px 6px;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-hover);
  color: var(--text-primary);
}
.param-select:focus { border-color: var(--accent); outline: none; }

.panel-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--bg-card);
}
.panel-summary .sig-badge {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
}
.sig-badge.overbought { background: var(--red-rise-light); color: var(--red-rise); }
.sig-badge.oversold { background: var(--green-fall-light); color: var(--green-fall); }
.sig-badge.neutral { background: var(--bg-hover); color: var(--text-muted); }
.sig-badge.golden-cross { background: var(--red-rise-light); color: var(--red-rise); }
.sig-badge.death-cross { background: var(--green-fall-light); color: var(--green-fall); }

.chart-container {
  flex: 1;
  min-height: 280px;
  padding: 0;
}

/* ===== Upload Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 480px;
  width: 90%;
  box-shadow: var(--shadow);
}
.modal h2 { font-size: 16px; margin-bottom: 12px; }
.modal-close {
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 18px;
  cursor: pointer;
  color: var(--text-muted);
}
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s;
}
.upload-zone:hover { border-color: var(--accent); }
.upload-zone.dragover { border-color: var(--accent); background: var(--slider-fill); }
.upload-zone .icon { font-size: 32px; color: var(--text-muted); margin-bottom: 8px; }
.upload-zone .hint { font-size: 13px; color: var(--text-secondary); }
.upload-zone .sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.stock-search-input {
  width: 100%;
  padding: 8px 12px;
  font-size: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-hover);
  color: var(--text-primary);
  margin-bottom: 12px;
}
.stock-search-input:focus { border-color: var(--accent); outline: none; }

.search-results {
  max-height: 200px;
  overflow-y: auto;
}
.search-item {
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.1s;
}
.search-item:hover { background: var(--bg-hover); }

/* ===== Loading / Error ===== */
.loading-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 5;
  border-radius: var(--radius);
}
.loading-overlay.show { display: flex; }
.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  padding: 12px;
  background: var(--red-rise-light);
  color: var(--red-rise);
  border-radius: var(--radius-sm);
  font-size: 13px;
  display: none;
}
.error-msg.show { display: block; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state .hint { font-size: 15px; }

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .summary-row { grid-template-columns: repeat(2, 1fr); }
  .indicator-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .app-container { padding: 8px; }
  .summary-row { grid-template-columns: 1fr 1fr; }
  .top-bar .actions { flex-wrap: wrap; }
  .chart-container { min-height: 220px; }
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<div class="app-container" id="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo">📈 Stock Indicator Analyzer</div>
    <div class="stock-info">
      <span class="stock-name" id="stockName">未加载数据</span>
      <span class="data-source-tag" id="dataSourceTag">CSV</span>
    </div>
    <div class="actions">
      <button class="btn" id="btnUpload" title="上传CSV">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        上传CSV
      </button>
      <button class="btn" id="btnExport" title="导出CSV">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        导出CSV
      </button>
      <button class="btn btn-accent" id="btnDemo" title="重新加载兆易创新数据">
        重新加载
      </button>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="summary-row" id="summaryRow">
    <div class="summary-card">
      <span class="label">收盘价</span>
      <span class="value" id="sumClose">--</span>
      <span class="sub" id="sumCloseDate"></span>
    </div>
    <div class="summary-card">
      <span class="label">涨跌幅</span>
      <span class="value" id="sumPctChg">--</span>
      <span class="sub" id="sumPctChgSub"></span>
    </div>
    <div class="summary-card">
      <span class="label">ATR(14)</span>
      <span class="value" id="sumATR">--</span>
      <span class="sub" id="sumATRSub"></span>
    </div>
    <div class="summary-card">
      <span class="label">波动等级</span>
      <span class="value" id="sumVol">--</span>
      <span class="sub" id="sumVolSub"></span>
    </div>
  </div>

  <!-- Error Message -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Time Slider -->
  <div class="slider-panel" id="sliderPanel">
    <div class="slider-header">
      <div>
        <span class="title">时间范围</span>
        <span class="range-label" id="sliderRangeLabel"></span>
      </div>
      <div class="quick-btns">
        <button class="quick-btn" data-range="12">1年</button>
        <button class="quick-btn" data-range="6">6月</button>
        <button class="quick-btn" data-range="3">3月</button>
        <button class="quick-btn" data-range="1">1月</button>
        <button class="quick-btn" data-range="0">全部</button>
      </div>
    </div>
    <div class="slider-track-wrapper" id="sliderTrackWrapper">
      <div class="slider-track"></div>
      <div class="slider-fill" id="sliderFill"></div>
      <div class="slider-handle" id="handleLeft" data-handle="left"></div>
      <div class="slider-handle" id="handleRight" data-handle="right"></div>
    </div>
    <div class="slider-ticks" id="sliderTicks"></div>
    <div class="slider-hint" id="sliderHint">请先加载数据</div>
  </div>

  <!-- Indicator Grid -->
  <div class="indicator-grid" id="indicatorGrid">
    <!-- RSI Panel -->
    <div class="indicator-panel" id="panelRSI">
      <div class="panel-header">
        <span class="panel-title">RSI 相对强弱指标</span>
        <div class="panel-params">
          <div class="param-group">
            <span class="param-label">周期</span>
            <select class="param-select" id="rsiPeriod">
              <option value="6">6</option>
              <option value="10">10</option>
              <option value="14" selected>14</option>
              <option value="20">20</option>
              <option value="28">28</option>
            </select>
          </div>
          <div class="param-group">
            <span class="param-label">超买</span>
            <input class="param-input" type="number" id="rsiOB" value="70" min="60" max="90">
          </div>
          <div class="param-group">
            <span class="param-label">超卖</span>
            <input class="param-input" type="number" id="rsiOS" value="30" min="10" max="40">
          </div>
        </div>
      </div>
      <div class="panel-summary" id="rsiSummary">
        <span>当前值: --</span>
        <span class="sig-badge neutral">--</span>
      </div>
      <div class="chart-container" id="chartRSI"></div>
    </div>

    <!-- MACD Panel -->
    <div class="indicator-panel" id="panelMACD">
      <div class="panel-header">
        <span class="panel-title">MACD 收敛/发散指标</span>
        <div class="panel-params">
          <div class="param-group">
            <span class="param-label">快线</span>
            <input class="param-input" type="number" id="macdFast" value="12" min="5" max="30">
          </div>
          <div class="param-group">
            <span class="param-label">慢线</span>
            <input class="param-input" type="number" id="macdSlow" value="26" min="15" max="60">
          </div>
          <div class="param-group">
            <span class="param-label">信号</span>
            <input class="param-input" type="number" id="macdSignal" value="9" min="3" max="20">
          </div>
        </div>
      </div>
      <div class="panel-summary" id="macdSummary">
        <span>DIF: -- DEA: --</span>
        <span class="sig-badge neutral">--</span>
      </div>
      <div class="chart-container" id="chartMACD"></div>
    </div>

    <!-- Bollinger Bands Panel -->
    <div class="indicator-panel" id="panelBB">
      <div class="panel-header">
        <span class="panel-title">布林带 Bollinger Bands</span>
        <div class="panel-params">
          <div class="param-group">
            <span class="param-label">周期</span>
            <input class="param-input" type="number" id="bbPeriod" value="20" min="10" max="50">
          </div>
          <div class="param-group">
            <span class="param-label">倍数</span>
            <input class="param-input" type="number" id="bbMult" value="2.0" min="1.0" max="3.0" step="0.1">
          </div>
        </div>
      </div>
      <div class="panel-summary" id="bbSummary">
        <span>上轨: -- 下轨: -- %B: --</span>
        <span class="sig-badge neutral">--</span>
      </div>
      <div class="chart-container" id="chartBB"></div>
    </div>

    <!-- ATR Panel -->
    <div class="indicator-panel" id="panelATR">
      <div class="panel-header">
        <span class="panel-title">ATR 平均真实波幅</span>
        <div class="panel-params">
          <div class="param-group">
            <span class="param-label">周期</span>
            <input class="param-input" type="number" id="atrPeriod" value="14" min="7" max="30">
          </div>
          <div class="param-group">
            <span class="param-label">止损倍数</span>
            <input class="param-input" type="number" id="atrStop" value="1.5" min="1.0" max="3.0" step="0.5">
          </div>
        </div>
      </div>
      <div class="panel-summary" id="atrSummary">
        <span>ATR: -- 占收盘: --</span>
        <span class="sig-badge neutral">--</span>
      </div>
      <div class="chart-container" id="chartATR"></div>
    </div>
  </div>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <h2>上传CSV数据文件</h2>
    <div class="upload-zone" id="uploadZone">
      <div class="icon">📄</div>
      <div class="hint">点击或拖拽CSV文件至此处</div>
      <div class="sub">支持Tushare导出格式（UTF-8 / GBK编码）</div>
    </div>
    <input type="file" id="fileInput" accept=".csv" hidden>
    <div style="margin-top:12px; text-align:right;">
      <button class="btn" id="btnModalClose">关闭</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   EMBEDDED_CSV — 兆易创新603986日线数据（内嵌，确保离线可用）
   ============================================================ */
const EMBEDDED_CSV = `ts_code,trade_date,open,high,low,close,pre_close,change,pct_chg,vol,amount

/* ============================================================
   Calculator — 技术指标计算引擎
   ============================================================ */
const Calculator = {
  calcEMA(data, period) {
    const alpha = 2 / (period + 1);
    const ema = [data[0]];
    for (let i = 1; i < data.length; i++) {
      ema.push(alpha * data[i] + (1 - alpha) * ema[i - 1]);
    }
    return ema;
  },

  calcSMA(data, period) {
    const sma = [];
    for (let i = 0; i < data.length; i++) {
      if (i < period - 1) { sma.push(null); continue; }
      const sum = data.slice(i - period + 1, i + 1).reduce((a, b) => a + b, 0);
      sma.push(sum / period);
    }
    return sma;
  },

  calcRSI(closes, period) {
    const gains = [], losses = [];
    for (let i = 1; i < closes.length; i++) {
      const delta = closes[i] - closes[i - 1];
      gains.push(delta > 0 ? delta : 0);
      losses.push(delta < 0 ? -delta : 0);
    }
    if (gains.length < period) {
      return Array(closes.length).fill(null);
    }
    let avgGain = gains.slice(0, period).reduce((a, b) => a + b) / period;
    let avgLoss = losses.slice(0, period).reduce((a, b) => a + b) / period;
    const rsi = Array(period).fill(null);
    const rs = avgLoss === 0 ? 999 : avgGain / avgLoss;
    rsi.push(100 - 100 / (1 + rs));
    for (let i = period; i < gains.length; i++) {
      avgGain = (avgGain * (period - 1) + gains[i]) / period;
      avgLoss = (avgLoss * (period - 1) + losses[i]) / period;
      const rs = avgLoss === 0 ? 999 : avgGain / avgLoss;
      rsi.push(100 - 100 / (1 + rs));
    }
    return rsi;
  },

  calcMACD(closes, fast, slow, signal) {
    const emaFast = this.calcEMA(closes, fast);
    const emaSlow = this.calcEMA(closes, slow);
    const dif = emaFast.map((v, i) => v - emaSlow[i]);
    const dea = this.calcEMA(dif, signal);
    const macdBar = dif.map((v, i) => (v - dea[i]) * 2);
    // Find golden cross & death cross
    const goldenCross = [], deathCross = [];
    for (let i = 1; i < dif.length; i++) {
      if (dif[i - 1] < dea[i - 1] && dif[i] >= dea[i]) goldenCross.push(i);
      if (dif[i - 1] > dea[i - 1] && dif[i] <= dea[i]) deathCross.push(i);
    }
    return { dif, dea, macdBar, goldenCross, deathCross };
  },

  calcBB(closes, period, multiplier) {
    const middle = this.calcSMA(closes, period);
    const stdDev = [];
    for (let i = 0; i < closes.length; i++) {
      if (middle[i] === null) { stdDev.push(null); continue; }
      const slice = closes.slice(i - period + 1, i + 1);
      const mean = middle[i];
      const variance = slice.reduce((s, v) => s + (v - mean) ** 2, 0) / period;
      stdDev.push(Math.sqrt(variance));
    }
    const upper = middle.map((m, i) => m === null ? null : m + multiplier * stdDev[i]);
    const lower = middle.map((m, i) => m === null ? null : m - multiplier * stdDev[i]);
    const width = middle.map((m, i) => m === null ? null : (upper[i] - lower[i]) / m * 100);
    const percentB = closes.map((c, i) => lower[i] === null ? null : (c - lower[i]) / (upper[i] - lower[i]));
    return { middle, upper, lower, width, percentB };
  },

  calcATR(highs, lows, closes, period) {
    const tr = [];
    for (let i = 0; i < highs.length; i++) {
      const tr1 = highs[i] - lows[i];
      const tr2 = i === 0 ? tr1 : Math.abs(highs[i] - closes[i - 1]);
      const tr3 = i === 0 ? tr1 : Math.abs(lows[i] - closes[i - 1]);
      tr.push(Math.max(tr1, tr2, tr3));
    }
    if (tr.length < period) return { tr, atr: Array(tr.length).fill(null), atr7: Array(tr.length).fill(null) };
    // Wilder递推 for ATR(period)
    const atr = Array(period - 1).fill(null);
    atr.push(tr.slice(0, period).reduce((a, b) => a + b) / period);
    for (let i = period; i < tr.length; i++) {
      atr.push((atr[i - 1] * (period - 1) + tr[i]) / period);
    }
    // ATR(7) for comparison
    const p7 = 7;
    const atr7 = Array(p7 - 1).fill(null);
    atr7.push(tr.slice(0, p7).reduce((a, b) => a + b) / p7);
    for (let i = p7; i < tr.length; i++) {
      atr7.push((atr7[i - 1] * (p7 - 1) + tr[i]) / p7);
    }
    return { tr, atr, atr7 };
  },

  computeAll(data) {
    const closes = data.map(d => d.close);
    const highs = data.map(d => d.high);
    const lows = data.map(d => d.low);
    const { rsi } = AppState.indicators;
    const { fast, slow, signal } = AppState.indicators.macd;
    const { period: bbP, multiplier: bbM } = AppState.indicators.bb;
    const { period: atrP, stopMult } = AppState.indicators.atr;

    const rsiVals = this.calcRSI(closes, rsi.period);
    const macdVals = this.calcMACD(closes, fast, slow, signal);
    const bbVals = this.calcBB(closes, bbP, bbM);
    const atrVals = this.calcATR(highs, lows, closes, atrP);

    // Volatility level
    const validATR = atrVals.atr.filter(v => v !== null);
    const atrMean = validATR.length > 0 ? validATR.reduce((a, b) => a + b) / validATR.length : 0;
    const atrQ25 = this._percentile(validATR, 25);
    const atrQ75 = this._percentile(validATR, 75);

    const volatilityLevels = atrVals.atr.map(v => {
      if (v === null) return 'N/A';
      if (v < atrQ25) return '低';
      if (v > atrQ75) return '高';
      return '中';
    });

    return {
      rsi: rsiVals,
      macd: macdVals,
      bb: bbVals,
      atr: atrVals,
      volatilityLevels,
      atrMean, atrQ25, atrQ75
    };
  },

  _percentile(arr, p) {
    const sorted = [...arr].sort((a, b) => a - b);
    const idx = (sorted.length - 1) * p / 100;
    const lower = Math.floor(idx);
    const upper = Math.ceil(idx);
    if (lower === upper) return sorted[lower];
    return sorted[lower] + (sorted[upper] - sorted[lower]) * (idx - lower);
  }
};

/* ============================================================
   DataParser — CSV数据解析
   ============================================================ */
const DataParser = {
  parseCSV(text) {
    // Strip UTF-8 BOM if present
    if (text.charCodeAt(0) === 0xFEFF) {
      text = text.slice(1);
    }
    // Also strip BOM that may appear as ﻿ string
    text = text.replace(/^\uFEFF/, '');
    
    const result = Papa.parse(text.trim(), {
      header: true,
      dynamicTyping: true,
      skipEmptyLines: true
    });

    // Debug: log parsed headers and first row
    console.log('PapaParse headers:', result.meta.fields);
    if (result.data.length > 0) {
      console.log('PapaParse first row:', result.data[0]);
    }
    console.log('PapaParse errors:', result.errors);
    console.log('PapaParse data count:', result.data.length);

    if (result.errors.length > 0 && result.data.length === 0) {
      // Try decoding as GBK
      try {
        const decoder = new TextDecoder('gbk');
        const bytes = new Uint8Array([...text].map(c => c.charCodeAt(0)));
        const decoded = decoder.decode(bytes);
        const retry = Papa.parse(decoded.trim(), {
          header: true,
          dynamicTyping: true,
          skipEmptyLines: true
        });
        if (retry.data.length > 0) return this.normalize(retry.data);
      } catch(e) {}
    }
    if (result.data.length === 0) {
      throw new Error('CSV解析失败，无有效数据行');
    }
    return this.normalize(result.data);
  },

  normalize(rawRows) {
    // Normalize field names (case-insensitive mapping, strip BOM)
    const fieldMap = {
      'ts_code': 'ts_code', 'trade_date': 'trade_date',
      'open': 'open', 'high': 'high', 'low': 'low',
      'close': 'close', 'pre_close': 'pre_close',
      'change': 'change', 'pct_chg': 'pct_chg',
      'vol': 'vol', 'amount': 'amount',
      // Common Chinese alternatives
      '代码': 'ts_code', '日期': 'trade_date',
      '开盘': 'open', '最高': 'high', '最低': 'low',
      '收盘': 'close', '昨收': 'pre_close',
      '涨跌额': 'change', '涨跌幅': 'pct_chg',
      '成交量': 'vol', '成交额': 'amount',
      '股票代码': 'ts_code', '交易日期': 'trade_date',
      '收盘价': 'close', '开盘价': 'open'
    };
    return rawRows.map(row => {
      const norm = {};
      for (const [key, val] of Object.entries(row)) {
        // Strip BOM, whitespace, and normalize
        const cleanKey = key.replace(/\uFEFF/g, '').toLowerCase().trim();
        const mapped = fieldMap[cleanKey] || cleanKey;
        norm[mapped] = val;
      }
      // Parse trade_date - handle both string and number types
      if (norm.trade_date !== undefined && norm.trade_date !== null) {
        const dateStr = String(norm.trade_date).replace(/\D/g, '');
        if (dateStr.length === 8) {
          norm.trade_date_fmt = `${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`;
          norm.trade_date_ts = new Date(norm.trade_date_fmt).getTime();
        } else if (String(norm.trade_date).match(/^\d{4}-\d{2}-\d{2}$/)) {
          // Already in YYYY-MM-DD format
          norm.trade_date_fmt = String(norm.trade_date);
          norm.trade_date_ts = new Date(norm.trade_date_fmt).getTime();
        }
      }
      // Ensure numeric fields
      const numFields = ['open','high','low','close','pre_close','change','pct_chg','vol','amount'];
      for (const f of numFields) {
        if (norm[f] !== undefined && norm[f] !== null) {
          norm[f] = parseFloat(norm[f]);
        }
      }
      return norm;
    }).filter(r => r.trade_date_ts && !isNaN(r.close));
  },

  generateDemoData() {
    // Generate demo data for 兆易创新 603986
    const rows = [];
    const start = new Date('2025-07-04');
    let price = 118.85;
    for (let i = 0; i < 242; i++) {
      const d = new Date(start.getTime() + i * 86400000);
      // Skip weekends
      const dow = d.getDay();
      if (dow === 0 || dow === 6) continue;
      const change = (Math.random() - 0.48) * 4;
      const pct = change / price * 100;
      const open = price + (Math.random() - 0.5) * 2;
      const high = Math.max(open, price + change) + Math.random() * 1.5;
      const low = Math.min(open, price + change) - Math.random() * 1.5;
      const close = price + change;
      const pre_close = price;
      const vol = 100000 + Math.random() * 80000;
      const amount = vol * close;
      const dateStr = d.toISOString().slice(0, 10).replace(/-/g, '');
      rows.push({
        ts_code: '603986.SH',
        trade_date: dateStr,
        trade_date_fmt: d.toISOString().slice(0, 10),
        trade_date_ts: d.getTime(),
        open: +open.toFixed(2),
        high: +high.toFixed(2),
        low: +low.toFixed(2),
        close: +close.toFixed(2),
        pre_close: +pre_close.toFixed(2),
        change: +change.toFixed(2),
        pct_chg: +pct.toFixed(4),
        vol: +vol.toFixed(2),
        amount: +amount.toFixed(2)
      });
      price = close;
    }
    return rows;
  }
};

/* ============================================================
   TimeSlider — 双端时间滑条
   ============================================================ */
const TimeSlider = {
  isDragging: false,
  activeHandle: null,
  startX: 0,
  startPos: 0,
  wrapperEl: null,
  handleLeftEl: null,
  handleRightEl: null,
  fillEl: null,

  init() {
    this.wrapperEl = document.getElementById('sliderTrackWrapper');
    this.handleLeftEl = document.getElementById('handleLeft');
    this.handleRightEl = document.getElementById('handleRight');
    this.fillEl = document.getElementById('sliderFill');

    this.handleLeftEl.addEventListener('mousedown', (e) => this._onDragStart(e, 'left'));
    this.handleRightEl.addEventListener('mousedown', (e) => this._onDragStart(e, 'right'));
    document.addEventListener('mousemove', (e) => this._onDragMove(e));
    document.addEventListener('mouseup', (e) => this._onDragEnd(e));

    // Touch support
    this.handleLeftEl.addEventListener('touchstart', (e) => this._onDragStart(e.touches[0], 'left'));
    this.handleRightEl.addEventListener('touchstart', (e) => this._onDragStart(e.touches[0], 'right'));
    document.addEventListener('touchmove', (e) => this._onDragMove(e.touches[0]));
    document.addEventListener('touchend', (e) => this._onDragEnd(e));

    // Quick buttons
    document.querySelectorAll('.quick-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const months = parseInt(btn.dataset.range);
        this._setQuickRange(months);
        // Highlight active
        document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  },

  setData(data) {
    if (data.length === 0) return;
    const firstTs = data[0].trade_date_ts;
    const lastTs = data[data.length - 1].trade_date_ts;
    AppState.timeSlider.fullRange = { start: firstTs, end: lastTs };
    AppState.timeSlider.selectedRange = { start: firstTs, end: lastTs };
    AppState.timeSlider.leftPos = 0;
    AppState.timeSlider.rightPos = 1;
    this._updateVisual();
    this._updateTicks();
    this._updateHint();
    this._updateRangeLabel();
  },

  _onDragStart(e, handle) {
    this.isDragging = true;
    this.activeHandle = handle;
    this.startX = e.clientX;
    this.startPos = handle === 'left' ? AppState.timeSlider.leftPos : AppState.timeSlider.rightPos;
    e.preventDefault();
  },

  _onDragMove(e) {
    if (!this.isDragging) return;
    const wrapperRect = this.wrapperEl.getBoundingClientRect();
    const currentX = e.clientX - wrapperRect.left;
    const ratio = Math.max(0, Math.min(1, currentX / wrapperRect.width));

    if (this.activeHandle === 'left') {
      AppState.timeSlider.leftPos = Math.min(ratio, AppState.timeSlider.rightPos - 0.02);
    } else {
      AppState.timeSlider.rightPos = Math.max(ratio, AppState.timeSlider.leftPos + 0.02);
    }
    this._updateVisual();
    this._updateRangeFromPos();
    this._updateHint();
  },

  _onDragEnd(e) {
    if (!this.isDragging) return;
    this.isDragging = false;
    this.activeHandle = null;
    this._applyRange();
  },

  _updateVisual() {
    const wrapperRect = this.wrapperEl.getBoundingClientRect();
    const leftPx = AppState.timeSlider.leftPos * wrapperRect.width;
    const rightPx = AppState.timeSlider.rightPos * wrapperRect.width;

    this.handleLeftEl.style.left = leftPx + 'px';
    this.handleRightEl.style.left = (rightPx - 8) + 'px';
    this.fillEl.style.left = leftPx + 'px';
    this.fillEl.style.width = (rightPx - leftPx) + 'px';
  },

  _updateRangeFromPos() {
    const { start, end } = AppState.timeSlider.fullRange;
    const range = end - start;
    AppState.timeSlider.selectedRange.start = start + AppState.timeSlider.leftPos * range;
    AppState.timeSlider.selectedRange.end = start + AppState.timeSlider.rightPos * range;
  },

  _setQuickRange(months) {
    if (AppState.rawData.length === 0) return;
    const { start, end } = AppState.timeSlider.fullRange;
    if (months === 0) {
      AppState.timeSlider.leftPos = 0;
      AppState.timeSlider.rightPos = 1;
    } else {
      const ms = months * 30 * 86400000;
      const newStart = Math.max(start, end - ms);
      AppState.timeSlider.leftPos = (newStart - start) / (end - start);
      AppState.timeSlider.rightPos = 1;
    }
    this._updateVisual();
    this._updateRangeFromPos();
    this._updateHint();
    this._applyRange();
  },

  _updateTicks() {
    const ticksEl = document.getElementById('sliderTicks');
    ticksEl.innerHTML = '';
    const { start, end } = AppState.timeSlider.fullRange;
    const count = 5;
    for (let i = 0; i <= count; i++) {
      const ts = start + (end - start) * i / count;
      const d = new Date(ts);
      const label = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const tick = document.createElement('span');
      tick.className = 'slider-tick';
      tick.textContent = label;
      tick.style.left = (i / count * 100) + '%';
      ticksEl.appendChild(tick);
    }
  },

  _updateHint() {
    const { start, end } = AppState.timeSlider.selectedRange;
    const sd = new Date(start);
    const ed = new Date(end);
    const months = Math.round((end - start) / (30 * 86400000));
    const filtered = AppState.rawData.filter(d => d.trade_date_ts >= start && d.trade_date_ts <= end);
    document.getElementById('sliderHint').textContent =
      `选中区间: ${sd.toISOString().slice(0,10)} ~ ${ed.toISOString().slice(0,10)} (${months}个月, ${filtered.length}条数据)`;
  },

  _updateRangeLabel() {
    const { start, end } = AppState.timeSlider.fullRange;
    const sd = new Date(start).toISOString().slice(0,7);
    const ed = new Date(end).toISOString().slice(0,7);
    document.getElementById('sliderRangeLabel').textContent = `${sd} ~ ${ed}`;
  },

  _applyRange() {
    const { start, end } = AppState.timeSlider.selectedRange;
    AppState.filteredData = AppState.rawData.filter(d => d.trade_date_ts >= start && d.trade_date_ts <= end);
    UIController.recomputeAndRender();
  }
};

      rsiPeriod: { group: 'rsi', key: 'period', type: 'int', chart: 'rsi' },
      rsiOB: { group: 'rsi', key: 'overbought', type: 'int', chart: 'rsi' },
      rsiOS: { group: 'rsi', key: 'oversold', type: 'int', chart: 'rsi' },
      macdFast: { group: 'macd', key: 'fast', type: 'int', chart: 'macd' },
      macdSlow: { group: 'macd', key: 'slow', type: 'int', chart: 'macd' },
      macdSignal: { group: 'macd', key: 'signal', type: 'int', chart: 'macd' },
      bbPeriod: { group: 'bb', key: 'period', type: 'int', chart: 'bb' },
      bbMult: { group: 'bb', key: 'multiplier', type: 'float', chart: 'bb' },
      atrPeriod: { group: 'atr', key: 'period', type: 'int', chart: 'atr' },
      atrStop: { group: 'atr', key: 'stopMult', type: 'float', chart: 'atr' }
    };

    for (const [elId, cfg] of Object.entries(paramMap)) {
      const el = document.getElementById(elId);
      el.addEventListener('change', () => {
        const val = cfg.type === 'int' ? parseInt(el.value) : parseFloat(el.value);
        AppState.indicators[cfg.group][cfg.key] = val;
        this._debounceRender(cfg.chart, 300);
      });
      el.addEventListener('input', () => {
        const val = cfg.type === 'int' ? parseInt(el.value) : parseFloat(el.value);
        if (!isNaN(val)) {
          AppState.indicators[cfg.group][cfg.key] = val;
          this._debounceRender(cfg.chart, 300);
        }
      });
    }
  },

  _handleFile(file) {
    if (!file || !file.name.endsWith('.csv')) {
      this._showError('请选择CSV文件');
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = DataParser.parseCSV(e.target.result);
        if (data.length === 0) throw new Error('解析结果为空');
        this._loadData(data, file.name.replace('.csv', ''), 'csv');
      } catch(err) {
        this._showError('CSV解析失败: ' + err.message);
      }
    };
    reader.readAsText(file, 'UTF-8');
    document.getElementById('uploadModal').classList.remove('show');
  },

  _loadDemo() {
    // Load actual embedded 兆易创新 data
    const data = DataParser.parseCSV(EMBEDDED_CSV);
    this._loadData(data, '兆易创新 603986', 'csv');
  },

  _loadData(data, name, source) {
    // Sort by date
    data.sort((a, b) => a.trade_date_ts - b.trade_date_ts);
    AppState.rawData = data;
    AppState.filteredData = data;
    AppState.currentStock = { code: data[0].ts_code || '未知', name: name };
    AppState.dataSource = source;

    document.getElementById('stockName').textContent = name;
    document.getElementById('dataSourceTag').textContent = source === 'csv' ? 'CSV' : source === 'demo' ? '模拟' : 'API';
    this._hideError();

    // Setup time slider
    TimeSlider.setData(data);

    // Compute & render
    this.recomputeAndRender();

    // Update summary
    this._updateSummary(data);
  },

  recomputeAndRender() {
    const data = AppState.filteredData;
    if (data.length < 2) return;
    AppState.computedData = Calculator.computeAll(data);
    ChartManager.renderAll(data, AppState.computedData);
    this._updateSummary(data);
  },

  _debounceRender(chartName, delay) {
    if (this.debounceTimers[chartName]) clearTimeout(this.debounceTimers[chartName]);
    this.debounceTimers[chartName] = setTimeout(() => {
      if (AppState.filteredData.length < 2) return;
      AppState.computedData = Calculator.computeAll(AppState.filteredData);
      const method = `render${chartName.charAt(0).toUpperCase() + chartName.slice(1)}`;
      if (ChartManager[method]) {
        ChartManager[method](AppState.filteredData, AppState.computedData);
      }
    }, delay);
  },

  _updateSummary(data) {
    if (data.length === 0) return;
    const last = data[data.length - 1];
    const pctChg = last.pct_chg;
    const isRise = pctChg > 0;

    document.getElementById('sumClose').textContent = last.close.toFixed(2);
    document.getElementById('sumClose').className = 'value ' + (isRise ? 'rise' : 'fall');
    document.getElementById('sumCloseDate').textContent = last.trade_date_fmt;

    document.getElementById('sumPctChg').textContent = (isRise ? '+' : '') + pctChg.toFixed(2) + '%';
    document.getElementById('sumPctChg').className = 'value ' + (isRise ? 'rise' : 'fall');
    document.getElementById('sumPctChgSub').textContent = `涨跌: ${last.change.toFixed(2)}元`;

    const comp = AppState.computedData;
    if (comp.atr) {
      const lastATR = comp.atr.atr.filter(v => v !== null).pop();
      const atrPct = lastATR && last.close ? (lastATR / last.close * 100) : 0;
      document.getElementById('sumATR').textContent = lastATR ? lastATR.toFixed(1) : '--';
      document.getElementById('sumATRSub').textContent = `占收盘价 ${atrPct.toFixed(1)}%`;

      const lastVol = comp.volatilityLevels.filter(v => v !== 'N/A').pop();
      let badgeClass = 'mid';
      if (lastVol === '低') badgeClass = 'low';
      else if (lastVol === '高') badgeClass = 'high';
      document.getElementById('sumVol').textContent = lastVol || '--';
      document.getElementById('sumVol').className = 'value';
      document.getElementById('sumVolSub').innerHTML = `<span class="volatility-badge ${badgeClass}">${lastVol || '--'}波动</span>`;
    }
  },

  _showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  },

  _hideError() {
    document.getElementById('errorMsg').classList.remove('show');
  }
};

/* ============================================================
   Exporter — CSV导出
   ============================================================ */
const Exporter = {
  exportCSV() {
    const data = AppState.filteredData;
    const comp = AppState.computedData;
    if (data.length === 0) { UIController._showError('无数据可导出'); return; }

    const rows = data.map((d, i) => ({
      trade_date: d.trade_date_fmt,
      open: d.open,
      high: d.high,
      low: d.low,
      close: d.close,
      pre_close: d.pre_close,
      pct_chg: d.pct_chg,
      vol: d.vol,
      rsi_14: comp.rsi[i] !== null ? +comp.rsi[i].toFixed(2) : '',
      dif: comp.macd.dif[i] !== null ? +comp.macd.dif[i].toFixed(4) : '',
      dea: comp.macd.dea[i] !== null ? +comp.macd.dea[i].toFixed(4) : '',
      macd_bar: comp.macd.macdBar[i] !== null ? +comp.macd.macdBar[i].toFixed(4) : '',
      bb_upper: comp.bb.upper[i] !== null ? +comp.bb.upper[i].toFixed(2) : '',
      bb_middle: comp.bb.middle[i] !== null ? +comp.bb.middle[i].toFixed(2) : '',
      bb_lower: comp.bb.lower[i] !== null ? +comp.bb.lower[i].toFixed(2) : '',
      bb_pctB: comp.bb.percentB[i] !== null ? +comp.bb.percentB[i].toFixed(3) : '',
      atr_14: comp.atr.atr[i] !== null ? +comp.atr.atr[i].toFixed(2) : '',
      atr_7: comp.atr.atr7[i] !== null ? +comp.atr.atr7[i].toFixed(2) : '',
      volatility: comp.volatilityLevels[i] || ''
    }));

    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '技术指标');
    const stockName = AppState.currentStock ? AppState.currentStock.name.replace(/\s/g, '_') : 'data';
    XLSX.writeFile(wb, `${stockName}_技术指标分析.csv`);
  }
};

/* ============================================================
   Bootstrap — 初始化
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  ChartManager.initCharts();
  TimeSlider.init();
  UIController.init();

  // Auto-load embedded 兆易创新 CSV data (works offline)
  try {
    const data = DataParser.parseCSV(EMBEDDED_CSV);
    if (data.length > 0) {
      UIController._loadData(data, '兆易创新 603986', 'csv');
    }
  } catch(e) {
    console.log('Embedded data load failed:', e);
  }
});
</script>
