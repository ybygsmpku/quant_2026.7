<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双均线策略回测看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f8f7f5;
    --bg-tertiary: #f1efe8;
    --text-primary: #1a1a1a;
    --text-secondary: #5f5e5a;
    --text-muted: #888780;
    --border-light: #d3d1c7;
    --border-mid: #b4b2a9;
    --blue-50: #E6F1FB; --blue-400: #378ADD; --blue-800: #0C447C;
    --green-50: #EAF3DE; --green-400: #639922; --green-800: #173404;
    --red-50: #FCEBEB; --red-400: #E24B4A; --red-800: #791F1F;
    --amber-50: #FAEEDA; --amber-400: #BA7517;
    --teal-50: #E1F5EE; --teal-400: #1D9E75; --teal-800: #085041;
    --purple-50: #EEEDFE; --purple-400: #534AB7; --purple-800: #26215C;
    --pink-50: #FBEAF0; --pink-400: #D4537E;
    --coral-400: #D85A30;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    line-height: 1.6;
    padding: 20px;
    font-size: 14px;
  }
  .dashboard-title {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 16px;
    color: var(--text-primary);
  }
  .dashboard-title span { color: var(--text-muted); font-size: 13px; font-weight: 400; }
  .grid-top {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
  }
  .panel {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
  }
  .panel-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 12px;
    color: var(--text-primary);
  }
  .param-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .param-group { margin-bottom: 8px; }
  .param-group label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .param-group input, .param-group select {
    width: 100%;
    padding: 6px 10px;
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-md);
    font-size: 13px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    outline: none;
  }
  .param-group input:focus, .param-group select:focus {
    border-color: var(--blue-400);
  }
  .btn-run {
    display: block;
    width: 100%;
    padding: 10px;
    background: var(--blue-400);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .btn-run:hover { background: var(--blue-800); }
  .btn-run:disabled { background: var(--text-muted); cursor: not-allowed; }
  .btn-export {
    display: inline-block;
    padding: 6px 14px;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-md);
    font-size: 12px;
    cursor: pointer;
    margin-top: 8px;
  }
  .btn-export:hover { border-color: var(--blue-400); color: var(--blue-400); }
  .charts-area {
    display: grid;
    grid-template-rows: auto auto;
    gap: 12px;
  }
  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .chart-box {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 12px;
    position: relative;
  }
  .chart-box h3 {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-primary);
  }
  .chart-container { position: relative; width: 100%; height: 320px; }
  .chart-container-sm { position: relative; width: 100%; height: 220px; }
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
    margin-top: 16px;
  }
  .metric-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    text-align: center;
  }
  .metric-card .label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .metric-card .value { font-size: 20px; font-weight: 500; color: var(--text-primary); }
  .metric-card.positive .value { color: var(--green-800); }
  .metric-card.negative .value { color: var(--red-800); }
  .metric-card.sharpe { background: var(--purple-50); }
  .metric-card.sharpe .value { color: var(--purple-800); }
  .trades-panel {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-top: 16px;
  }
  .trades-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    max-height: 300px;
    overflow-y: auto;
  }
  .trades-table th {
    background: var(--bg-secondary);
    padding: 8px 6px;
    text-align: left;
    font-weight: 500;
    color: var(--text-secondary);
    border-bottom: 0.5px solid var(--border-light);
    position: sticky;
    top: 0;
  }
  .trades-table td {
    padding: 6px;
    border-bottom: 0.5px solid var(--border-light);
    color: var(--text-primary);
  }
  .trades-table tr.buy td.direction { color: var(--green-400); }
  .trades-table tr.sell td.direction { color: var(--red-400); }
  .error-msg {
    background: var(--red-50);
    color: var(--red-800);
    padding: 10px 14px;
    border-radius: var(--radius-md);
    font-size: 13px;
    margin-top: 8px;
  }
  .loading-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--blue-400); z-index: 999;
  }
  @media (max-width: 900px) {
    .grid-top { grid-template-columns: 1fr; }
    .chart-row { grid-template-columns: 1fr; }
    .metrics-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<div class="dashboard-title">双均线策略回测看板 <span>— 交互式量化策略评估工具</span></div>

<div class="grid-top">
  <!-- A: 参数面板 -->
  <div class="panel" id="paramPanel">
    <div class="panel-title">参数设置</div>
    <div class="param-row">
      <div class="param-group">
        <label>股票代码</label>
        <input type="text" id="stockCode" value="603986" placeholder="输入6位代码">
      </div>
      <div class="param-group">
        <label>基准指数</label>
        <select id="benchmarkSelect">
          <option value="000300">沪深300</option>
          <option value="fixed02">银行定存 2%</option>
        </select>
      </div>
    </div>
    <div class="param-row">
      <div class="param-group">
        <label>开始日期</label>
        <input type="date" id="startDate" value="2025-07-10">
      </div>
      <div class="param-group">
        <label>结束日期</label>
        <input type="date" id="endDate" value="2026-07-10">
      </div>
    </div>
    <div class="param-row">
      <div class="param-group">
        <label>短均线周期</label>
        <input type="number" id="shortPeriod" value="5" min="2" max="60" step="1">
      </div>
      <div class="param-group">
        <label>长均线周期</label>
        <input type="number" id="longPeriod" value="20" min="5" max="120" step="1">
      </div>
    </div>
    <div class="param-row">
      <div class="param-group">
        <label>初始资金 (元)</label>
        <input type="number" id="initCash" value="100000" min="10000" step="10000">
      </div>
      <div class="param-group">
        <label>手续费率 (%)</label>
        <input type="number" id="commissionRate" value="0.1" min="0" max="0.3" step="0.01">
      </div>
    </div>
    <div class="param-row">
      <div class="param-group">
        <label>滑点比例 (%)</label>
        <input type="number" id="slippage" value="0.2" min="0" max="1" step="0.01">
      </div>
      <div class="param-group">
        <label>最小交易单位</label>
        <input type="number" id="lotSize" value="100" min="1" step="1">
      </div>
    </div>
    <div id="errorMsg" class="error-msg" style="display:none;"></div>
    <button class="btn-run" id="btnRun" onclick="runBacktest()">运行回测</button>
  </div>

  <!-- B: 图表区 -->
  <div class="charts-area">
    <div class="chart-box">
      <h3>K线 + 双均线 + 交易信号</h3>
      <div class="chart-container"><canvas id="mainChart"></canvas></div>
    </div>
    <div class="chart-row">
      <div class="chart-box">
        <h3>净值曲线 (策略 vs 基准)</h3>
        <div class="chart-container-sm"><canvas id="navChart"></canvas></div>
      </div>
      <div class="chart-box">
        <h3>回撤曲线</h3>
        <div class="chart-container-sm"><canvas id="drawdownChart"></canvas></div>
      </div>
    </div>
  </div>
</div>

<!-- C: 指标卡片 -->
<div class="metrics-grid" id="metricsGrid">
  <div class="metric-card positive"><div class="label">总收益率</div><div class="value" id="mTotalReturn">--</div></div>
  <div class="metric-card positive"><div class="label">年化收益率</div><div class="value" id="mAnnualReturn">--</div></div>
  <div class="metric-card positive"><div class="label">超额收益</div><div class="value" id="mExcessReturn">--</div></div>
  <div class="metric-card negative"><div class="label">最大回撤</div><div class="value" id="mMaxDrawdown">--</div></div>
  <div class="metric-card"><div class="label">胜率</div><div class="value" id="mWinRate">--</div></div>
  <div class="metric-card"><div class="label">盈亏比</div><div class="value" id="mPLRatio">--</div></div>
  <div class="metric-card sharpe"><div class="label">夏普比率</div><div class="value" id="mSharpe">--</div></div>
</div>

<!-- D: 交易记录 -->
<div class="trades-panel">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div class="panel-title">交易记录明细</div>
    <button class="btn-export" id="btnExport" onclick="exportTradesCSV()" style="display:none;">导出 CSV</button>
  </div>
  <div style="max-height:300px;overflow-y:auto;">
    <table class="trades-table" id="tradesTable">
      <thead><tr><th>#</th><th>日期</th><th>方向</th><th>成交价</th><th>股数</th><th>手续费</th><th>持仓</th><th>净值</th><th>本次盈亏</th></tr></thead>
      <tbody id="tradesBody"><tr><td colspan="9" style="text-align:center;color:var(--text-muted);">请先运行回测</td></tr></tbody>
    </table>
  </div>
</div>

  if (!info) throw new Error('未找到股票代码: ' + code);
  return { name: info.name, data: info.data };
}

function loadBenchmarkData(code) {
  if (code === 'fixed02') return null;
  const info = BENCHMARK_MAP[code];
  if (!info) throw new Error('未找到基准: ' + code);
  return { name: info.name, data: info.data };
}

// ========================================
// 回测引擎
// ========================================
function runBacktestEngine(stockData, params) {
  const { shortPeriod, longPeriod, initCash, commissionRate, slippage, lotSize, startDate, endDate } = params;

  // 过滤日期范围
  let data = stockData.filter(d => {
    const dt = d.trade_date;
    const sd = startDate.replace(/-/g, '');
    const ed = endDate.replace(/-/g, '');
    return dt >= sd && dt <= ed;
  });

  if (data.length < longPeriod) {
    return { error: '数据不足：需要至少 ' + longPeriod + ' 个交易日，当前仅 ' + data.length + ' 个' };
  }

  // 计算均线
  const closes = data.map(d => parseFloat(d.close));
  const dates = data.map(d => d.trade_date);

  function SMA(arr, n, i) {
    if (i < n - 1) return null;
    let sum = 0;
    for (let j = i - n + 1; j <= i; j++) sum += arr[j];
    return sum / n;
  }

  const maShort = closes.map((_, i) => SMA(closes, shortPeriod, i));
  const maLong = closes.map((_, i) => SMA(closes, longPeriod, i));

  // 生成信号
  const signals = data.map((_, i) => {
    if (i < longPeriod || maShort[i - 1] === null || maLong[i - 1] === null) return 0;
    const prevAbove = maShort[i - 1] > maLong[i - 1];
    const currAbove = maShort[i] > maLong[i];
    if (!prevAbove && currAbove) return 1;   // 金叉买入
    if (prevAbove && !currAbove) return -1;  // 死叉卖出
    return 0;
  });

  // 模拟交易
  let cash = initCash;
  let shares = 0;
  let position = false; // false=空仓, true=持仓
  const feeRate = commissionRate / 100;
  const slipRate = slippage / 100;

  const navSeries = [];
  const trades = [];
  let tradeCount = 0;

  // 追踪完整交易（买入→卖出配对）用于胜率/盈亏比
  let buyEntry = null; // { price, fee, totalCost }

  for (let i = 0; i < data.length; i++) {
    const price = closes[i];
    const signal = signals[i];

    if (signal === 1 && !position) {
      // 买入
      const buyPrice = price * (1 + slipRate);
      const maxShares = Math.floor(cash / (buyPrice * (1 + feeRate)));
      const actualShares = Math.floor(maxShares / lotSize) * lotSize;
      if (actualShares <= 0) {
        navSeries.push(cash);
        continue;
      }
      const buyFee = buyPrice * actualShares * feeRate;
      const totalCost = buyPrice * actualShares + buyFee;
      cash -= totalCost;
      shares = actualShares;
      position = true;
      buyEntry = { price: buyPrice, fee: buyFee, totalCost: totalCost, shares: actualShares, navAtBuy: cash + shares * price };
      tradeCount++;
      trades.push({
        idx: tradeCount,
        date: dates[i],
        direction: '买入',
        execPrice: buyPrice.toFixed(2),
        shares: actualShares,
        fee: buyFee.toFixed(2),
        position: '持仓',
        nav: (cash + shares * price).toFixed(2),
        pnl: '--'
      });
    } else if (signal === -1 && position) {
      // 卖出
      const sellPrice = price * (1 - slipRate);
      const sellFee = sellPrice * shares * feeRate;
      const sellIncome = sellPrice * shares - sellFee;
      cash += sellIncome;

      // 计算本次盈亏
      const totalBuyCost = buyEntry.totalCost;
      const totalSellIncome = sellIncome;
      const pnlPct = ((totalSellIncome - totalBuyCost) / totalBuyCost * 100).toFixed(2);

      trades.push({
        idx: tradeCount,
        date: dates[i],
        direction: '卖出',
        execPrice: sellPrice.toFixed(2),
        shares: shares,
        fee: sellFee.toFixed(2),
        position: '空仓',
        nav: cash.toFixed(2),
        pnl: pnlPct + '%'
      });

      position = false;
      shares = 0;
      buyEntry = null;
    }

    // 当日净值
    const nav = position ? (cash + shares * price) : cash;
    navSeries.push(nav);
  }

  // 强制最后一天卖出（如果仍持仓）
  if (position && data.length > 0) {
    const lastPrice = closes[data.length - 1] * (1 - slipRate);
    const lastFee = lastPrice * shares * feeRate;
    cash += lastPrice * shares - lastFee;
    if (buyEntry) {
      const pnlPct = ((cash - buyEntry.totalCost + buyEntry.fee) / buyEntry.totalCost * 100).toFixed(2);
      trades.push({
        idx: tradeCount + 1,
        date: dates[data.length - 1],
        direction: '卖出(强制)',
        execPrice: lastPrice.toFixed(2),
        shares: shares,
        fee: lastFee.toFixed(2),
        position: '空仓',
        nav: cash.toFixed(2),
        pnl: pnlPct + '%'
      });
    }
    position = false;
    shares = 0;
    navSeries[navSeries.length - 1] = cash;
  }

  // ========================================
  // 计算量化指标
  // ========================================

  // 日收益率序列
  const dailyReturns = navSeries.map((nav, i) => i === 0 ? 0 : (nav / navSeries[i - 1] - 1));

  // 总收益率
  const totalReturn = (navSeries[navSeries.length - 1] - initCash) / initCash;

  // 年化收益率
  const tradingDays = navSeries.length;
  const annualReturn = Math.pow(1 + totalReturn, 365 / tradingDays) - 1;

  // 最大回撤
  let maxDD = 0;
  let peakNav = navSeries[0];
  let ddSeries = [];
  for (let i = 0; i < navSeries.length; i++) {
    if (navSeries[i] > peakNav) peakNav = navSeries[i];
    const dd = (navSeries[i] - peakNav) / peakNav;
    ddSeries.push(dd);
    if (dd < maxDD) maxDD = dd;
  }

  // 胜率 & 盈亏比（配对交易）
  const pairedTrades = [];
  for (let i = 0; i < trades.length; i++) {
    if (trades[i].direction.includes('买入')) {
      const buyTrade = trades[i];
      const sellIdx = trades.findIndex(t => t.direction.includes('卖出') && t.idx === buyTrade.idx);
      if (sellIdx > i) {
        pairedTrades.push({ buy: buyTrade, sell: trades[sellIdx] });
      }
    }
  }

  // 更好的配对方式
  const completeTrades = [];
  let currentBuy = null;
  for (const t of trades) {
    if (t.direction.includes('买入')) {
      currentBuy = t;
    } else if (t.direction.includes('卖出') && currentBuy) {
      const pnlVal = parseFloat(t.pnl.replace('%', ''));
      completeTrades.push({ pnl: pnlVal, buyDate: currentBuy.date, sellDate: t.date });
      currentBuy = null;
    }
  }

  const wins = completeTrades.filter(t => t.pnl > 0);
  const losses = completeTrades.filter(t => t.pnl <= 0);
  const winRate = completeTrades.length > 0 ? wins.length / completeTrades.length : 0;

  const avgWin = wins.length > 0 ? wins.reduce((s, t) => s + t.pnl, 0) / wins.length : 0;
  const avgLoss = losses.length > 0 ? Math.abs(losses.reduce((s, t) => s + t.pnl, 0) / losses.length) : 0;
  const plRatio = avgLoss > 0 ? avgWin / avgLoss : wins.length > 0 ? Infinity : 0;

  // 夏普比率
  const rfDaily = 0.02 / 252;
  const excessDailyReturns = dailyReturns.map(r => r - rfDaily);
  const meanExcess = excessDailyReturns.reduce((s, r) => s + r, 0) / excessDailyReturns.length;
  const stdDev = Math.sqrt(excessDailyReturns.reduce((s, r) => s + Math.pow(r - meanExcess, 2), 0) / excessDailyReturns.length);
  const sharpe = stdDev > 0 ? (meanExcess / stdDev) * Math.sqrt(252) : 0;

  return {
    dates, closes, maShort, maLong, signals, navSeries, ddSeries, dailyReturns,
    totalReturn, annualReturn, maxDD, winRate, plRatio, sharpe,
    trades, completeTrades, wins, losses, avgWin, avgLoss,
    tradingDays, initCash, finalNav: navSeries[navSeries.length - 1],
    error: null
  };
}

// ========================================
// 基准收益计算
// ========================================
function calcBenchmarkReturn(benchmarkData, startDate, endDate) {
  if (!benchmarkData) return 0.02 * 0.99; // 银行定存2%，约1年
  const sd = startDate.replace(/-/g, '');
  const ed = endDate.replace(/-/g, '');
  const filtered = benchmarkData.filter(d => d.trade_date >= sd && d.trade_date <= ed);
  if (filtered.length < 2) return 0;
  const startVal = parseFloat(filtered[0].close);
  const endVal = parseFloat(filtered[filtered.length - 1].close);
  return (endVal - startVal) / startVal;
}

function calcBenchmarkNavSeries(benchmarkData, startDate, endDate, initCash) {
  if (!benchmarkData) {
    // 银行定存：线性增长
    const sd = startDate.replace(/-/g, '');
    const ed = endDate.replace(/-/g, '');
    const days = Math.round((new Date(ed) - new Date(sd)) / (1000 * 86400));
    const dailyRate = 0.02 / 365;
    return Array.from({ length: Math.max(days, 1) }, (_, i) => initCash * Math.pow(1 + dailyRate, i));
  }
  const sd = startDate.replace(/-/g, '');
  const ed = endDate.replace(/-/g, '');
  const filtered = benchmarkData.filter(d => d.trade_date >= sd && d.trade_date <= ed);
  if (filtered.length < 2) return [];
  const startVal = parseFloat(filtered[0].close);
  return filtered.map(d => initCash * parseFloat(d.close) / startVal);
}

// ========================================
// 可视化渲染
// ========================================
let mainChart, navChart, drawdownChart;

function destroyCharts() {
  if (mainChart) mainChart.destroy();
  if (navChart) navChart.destroy();
  if (drawdownChart) drawdownChart.destroy();
}

function formatDates(dates) {
  return dates.map(d => {
    const y = d.substring(0, 4);
    const m = d.substring(4, 6);
    const dd = d.substring(6, 8);
    return m + '-' + dd;
  });
}

function renderCharts(result, benchmarkNav) {
  destroyCharts();
  const labels = formatDates(result.dates);

  // 颜色数组（涨红跌绿）
  const candleColors = result.closes.map((c, i) => {
    if (i === 0) return '#888780';
    return c >= result.closes[i - 1] ? '#E24B4A' : '#639922';
  });

  // 买入/卖出信号点
  const buyPoints = result.signals.map((s, i) => s === 1 ? result.closes[i] : null);
  const sellPoints = result.signals.map((s, i) => s === -1 ? result.closes[i] : null);

  // 主图：收盘价 + 双均线 + 信号
  mainChart = new Chart(document.getElementById('mainChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: '收盘价(前复权)',
          data: result.closes,
          borderColor: '#888780',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          pointRadius: 0,
          pointHoverRadius: 3,
          order: 3
        },
        {
          label: 'MA' + document.getElementById('shortPeriod').value,
          data: result.maShort,
          borderColor: '#378ADD',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 0,
          order: 2
        },
        {
          label: 'MA' + document.getElementById('longPeriod').value,
          data: result.maLong,
          borderColor: '#D85A30',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 0,
          order: 1
        },
        {
          label: '买入信号',
          data: buyPoints,
          borderColor: '#639922',
          backgroundColor: '#639922',
          pointRadius: 8,
          pointStyle: 'triangle',
          showLine: false,
          order: 0
        },
        {
          label: '卖出信号',
          data: sellPoints,
          borderColor: '#E24B4A',
          backgroundColor: '#E24B4A',
          pointRadius: 8,
          pointStyle: 'triangle',
          rotation: 180,
          showLine: false,
          order: 0
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { usePointStyle: true, pointStyleWidth: 10, font: { size: 12 } }
        },
        tooltip: {
          callbacks: {
            title: (items) => {
              const idx = items[0].dataIndex;
              return result.dates[idx];
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            maxTicksLimit: 15,
            maxRotation: 45,
            font: { size: 11 }
          }
        },
        y: {
          ticks: { font: { size: 11 } }
        }
      }
    }
  });

  // 净值曲线
  const benchLabels = benchmarkNav.length <= result.navSeries.length
    ? labels.slice(0, benchmarkNav.length)
    : labels;

  navChart = new Chart(document.getElementById('navChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: '策略净值',
          data: result.navSeries,
          borderColor: '#378ADD',
          backgroundColor: 'rgba(55,138,221,0.08)',
          borderWidth: 2,
          pointRadius: 0,
          fill: true
        },
        {

function renderMetrics(result, benchmarkReturn) {
  const excessReturn = result.totalReturn - benchmarkReturn;

  const fmtPct = (v) => (v >= 0 ? '+' : '') + (v * 100).toFixed(2) + '%';
  const fmtNum = (v) => v.toFixed(2);

  document.getElementById('mTotalReturn').textContent = fmtPct(result.totalReturn);
  document.getElementById('mAnnualReturn').textContent = fmtPct(result.annualReturn);
  document.getElementById('mExcessReturn').textContent = fmtPct(excessReturn);
  document.getElementById('mMaxDrawdown').textContent = fmtPct(result.maxDD);
  document.getElementById('mWinRate').textContent = (result.winRate * 100).toFixed(1) + '%';
  document.getElementById('mPLRatio').textContent = result.plRatio === Infinity ? 'Inf' : fmtNum(result.plRatio);
  document.getElementById('mSharpe').textContent = fmtNum(result.sharpe);

  // 颜色调整
  const cards = document.querySelectorAll('.metric-card');
  const excessCard = cards[2];
  if (excessReturn < 0) excessCard.classList.add('negative');
  else excessCard.classList.remove('negative');
  excessCard.classList.remove('positive');
  if (excessReturn >= 0) excessCard.classList.add('positive');

  const winCard = cards[4];
  if (result.winRate >= 0.5) winCard.classList.add('positive');
  else winCard.classList.add('negative');

  const plCard = cards[5];
  if (result.plRatio >= 2) plCard.classList.add('positive');
  else if (result.plRatio < 1) plCard.classList.add('negative');
}

function renderTrades(result) {
  const tbody = document.getElementById('tradesBody');
  tbody.innerHTML = '';
  for (const t of result.trades) {
    const row = document.createElement('tr');
    const cls = t.direction.includes('买入') ? 'buy' : 'sell';
    row.className = cls;
    row.innerHTML =
      '<td>' + t.idx + '</td>' +
      '<td>' + t.date + '</td>' +
      '<td class="direction">' + t.direction + '</td>' +
      '<td>' + t.execPrice + '</td>' +
      '<td>' + t.shares + '</td>' +
      '<td>' + t.fee + '</td>' +
      '<td>' + t.position + '</td>' +
      '<td>' + t.nav + '</td>' +
      '<td>' + t.pnl + '</td>';
    tbody.appendChild(row);
  }
  document.getElementById('btnExport').style.display = 'inline-block';
}

// ========================================
// 主流程
// ========================================
function runBacktest() {
  const code = document.getElementById('stockCode').value.trim();
  const benchmarkCode = document.getElementById('benchmarkSelect').value;
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  const shortP = parseInt(document.getElementById('shortPeriod').value);
  const longP = parseInt(document.getElementById('longPeriod').value);
  const initCash = parseFloat(document.getElementById('initCash').value);
  const commission = parseFloat(document.getElementById('commissionRate').value);
  const slip = parseFloat(document.getElementById('slippage').value);
  const lotSize = parseInt(document.getElementById('lotSize').value);

  // 校验
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!code || !STOCK_MAP[code]) {
    errEl.textContent = '未找到股票代码: ' + code + '，目前支持: ' + Object.keys(STOCK_MAP).join(', ');
    errEl.style.display = 'block';
    return;
  }
  if (longP <= shortP) {
    errEl.textContent = '长均线周期必须大于短均线周期';
    errEl.style.display = 'block';
    return;
  }
  if (!startDate || !endDate) {
    errEl.textContent = '请设置时间范围';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  btn.textContent = '正在回测...';

  try {
    // 加载股票数据
    console.log('[回测] 开始加载股票数据:', code);
    const stock = loadStockData(code);
    console.log('[回测] 股票数据加载成功:', stock.name, stock.data.length, '条');
    
    // 加载基准数据
    const benchmark = loadBenchmarkData(benchmarkCode);
    console.log('[回测] 基准数据:', benchmarkCode, benchmark ? benchmark.data.length + '条' : '银行定存2%');

    // 运行回测引擎
    const params = {
      shortPeriod: shortP,
      longPeriod: longP,
      initCash: initCash,
      commissionRate: commission,
      slippage: slip,
      lotSize: lotSize,
      startDate: startDate,
      endDate: endDate
    };

    const result = runBacktestEngine(stock.data, params);
    console.log('[回测] 回测完成:', result.error ? 'ERROR: ' + result.error : '成功');
    console.log('[回测] 总收益率:', (result.totalReturn * 100).toFixed(2) + '%');
    console.log('[回测] navSeries长度:', result.navSeries.length, '首值:', result.navSeries[0], '末值:', result.navSeries[result.navSeries.length-1]);

    if (result.error) {
      errEl.textContent = result.error;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '运行回测';
      return;
    }

    // 计算基准收益
    const benchReturn = calcBenchmarkReturn(benchmark ? benchmark.data : null, startDate, endDate);
    const benchNav = calcBenchmarkNavSeries(benchmark ? benchmark.data : null, startDate, endDate, initCash);
    console.log('[回测] 基准收益:', (benchReturn * 100).toFixed(2) + '%');

    // 渲染
    renderCharts(result, benchNav);
    renderMetrics(result, benchReturn);
    renderTrades(result);

    // 存储结果供导出
    window._backtestResult = result;

  } catch (e) {
    console.error('[回测] 错误:', e);
    errEl.textContent = '错误: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '运行回测';
  }
}

// ========================================
// 导出CSV
// ========================================
function exportTradesCSV() {
  const result = window._backtestResult;
  if (!result) return;

  const headers = ['#', '日期', '方向', '成交价', '股数', '手续费', '持仓状态', '净值', '本次盈亏'];
  const rows = result.trades.map(t =>
    [t.idx, t.date, t.direction, t.execPrice, t.shares, t.fee, t.position, t.nav, t.pnl].join(',')
  );

  const csvContent = '\uFEFF' + headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '双均线回测交易记录.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// 页面加载完成后自动运行一次回测
window.addEventListener('DOMContentLoaded', () => {
  runBacktest();
});
